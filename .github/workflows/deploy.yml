name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "k8s/**"
      - ".github/workflows/deploy.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - name: Install deps
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run pytest tests/ -x -q

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1012164228161/locations/global/workloadIdentityPools/github-actions/providers/github-actions
          service_account: gh-deploy-pulse@baldmaninc.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            us-docker.pkg.dev/baldmaninc/gcr.io/pulse:${{ github.sha }}
            us-docker.pkg.dev/baldmaninc/gcr.io/pulse:latest
          cache-from: type=registry,ref=us-docker.pkg.dev/baldmaninc/gcr.io/pulse:latest
          cache-to: type=inline

      - name: Get GKE credentials
        run: gcloud container clusters get-credentials clusterkit --region us-central1

      - name: Deploy
        run: |
          kubectl apply -f k8s/rbac.yaml
          kubectl set image deployment/pulse pulse=us-docker.pkg.dev/baldmaninc/gcr.io/pulse:${{ github.sha }} -n pulse
          kubectl rollout status deployment/pulse -n pulse --timeout=120s
