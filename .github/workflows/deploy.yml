name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "pyproject.toml"
      - "k8s/**"
      - ".github/workflows/deploy.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - name: Install deps
        run: uv venv && uv pip install -e ".[dev]"

      - name: Run tests
        run: uv run pytest tests/ -x -q

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            us-docker.pkg.dev/baldmaninc/gcr.io/pulse:${{ github.sha }}
            us-docker.pkg.dev/baldmaninc/gcr.io/pulse:latest
          cache-from: type=registry,ref=us-docker.pkg.dev/baldmaninc/gcr.io/pulse:latest
          cache-to: type=inline

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_REGION }}

      - name: Deploy
        run: |
          cd k8s
          sed -i "s|us-docker.pkg.dev/baldmaninc/gcr.io/pulse:latest|us-docker.pkg.dev/baldmaninc/gcr.io/pulse:${{ github.sha }}|" deployment.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
          kubectl rollout status deployment/pulse -n pulse --timeout=120s
